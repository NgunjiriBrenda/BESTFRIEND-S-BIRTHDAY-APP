<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Queen</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* Fade animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.fade-in{
animation:fadeIn 2s ease forwards;
}



.glow{
text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4,
0 0 40px #ff69b4;
}


@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.float{
animation:float 4s ease-in-out infinite;
}



.particle{
position:absolute;
width:4px;
height:4px;
background:pink;
border-radius:50%;
animation:particleMove linear infinite;
}

@keyframes particleMove{
from{transform:translateY(0); opacity:1}
to{transform:translateY(-100vh); opacity:0}
}


#countdown-screen{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:8rem;
color:gold;
z-index:50;
transition:opacity 1s ease;
}

</style>
</head>


<body class="text-yellow-300">


<div id="countdown-screen">
<span id="countdown">5</span>
</div>


<div class="fixed inset-0 -z-10">
<img src="assets/bestie.jpeg"
class="w-full h-full object-cover opacity-70 contrast-110">
<div class="fixed inset-0 bg-black/30 -z-10"></div>
</div>


<div id="particles"></div>


<section class="min-h-screen flex flex-col items-center justify-center text-center px-6 -mt-20">


<h1 class="text-5xl md:text-7xl font-bold mt-5 mb-12 glow text-pink-200">
The Birthday Queen 😝👑
</h1>

<button onclick="scrollToSection()"
class="mx-auto bg-gradient-to-r from-pink-400 to-pink-600 text-white px-10 py-4 rounded-full text-lg 
font-semibold shadow-2xl hover:scale-110 hover:shadow-pink-500/50 transition duration-300">

Enter Her Era 😝

</button>

</section>


</section>



<div class="absolute top-10 left-10 text-3xl float">👑</div>
<div class="absolute top-20 right-10 text-3xl float">✨</div>
<div class="absolute top-1/2 left-5 text-3xl float">💖</div>
<div class="absolute bottom-20 left-1/3 text-3xl float">🎉</div>






<div class="absolute top-10 left-10 text-3xl float">🎂</div>
<div class="absolute top-20 right-10 text-3xl float">🧁</div>
<div class="absolute bottom-20 left-20 text-3xl float">🎂</div>
<div class="absolute bottom-10 right-20 text-3xl float">🧁</div>



<script src="./index.js"></script>


</body>
</html>
