<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Queen</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* Fade animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.fade-in{
animation:fadeIn 2s ease forwards;
}

/* Glow text */

.glow{
text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4,
0 0 40px #ff69b4;
}

/* Floating animation */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.float{
animation:float 4s ease-in-out infinite;
}

/* Gold particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:pink;
border-radius:50%;
animation:particleMove linear infinite;
}

@keyframes particleMove{
from{transform:translateY(0); opacity:1}
to{transform:translateY(-100vh); opacity:0}
}

/* Countdown screen */

#countdown-screen{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:8rem;
color:gold;
z-index:50;
transition:opacity 1s ease;
}

</style>
</head>


<body class="text-yellow-300">

<!-- COUNTDOWN INTRO -->

<div id="countdown-screen">
<span id="countdown">3</span>
</div>



<!-- BACKGROUND IMAGE -->

<div class="fixed inset-0 -z-10">
<img src="assets/bestie2.jpeg"
class="w-full h-full object-cover opacity-70 brightness-110">
</div>



<!-- GOLD PARTICLES -->

<div id="particles"></div>



<!-- HERO SECTION -->

<section class="min-h-screen flex flex-col items-center justify-center text-center px-6 fade-in">

<h1 class="text-xl md:text-4xl tracking-widest text-gray-200">
Presenting...
</h1>

<h2 class="text-5xl md:text-7xl font-bold mt-5 mb-12 text-pink-400">
The Birthday Queen 😝👑
</h2>

<button onclick="scrollToSection()"
class="bg-pink-400 text-black px-10 py-4 rounded-full text-lg font-semibold
hover:scale-110 hover:bg-pink-300 transition duration-300 shadow-xl">

Enter Her Era 😝

</button>

</section>


</section>



<div class="absolute top-20 left-10 text-3xl float">👑</div>
<div class="absolute bottom-32 right-10 text-3xl float">✨</div>
<div class="absolute top-1/2 left-20 text-3xl float">💖</div>
<div class="absolute bottom-20 left-1/3 text-3xl float">🎉</div>



<!-- FLOATING CAKES -->

<div class="absolute top-32 right-20 text-3xl float">🎂</div>
<div class="absolute bottom-40 left-10 text-3xl float">🧁</div>
<div class="absolute top-1/3 right-1/4 text-3xl float">🎂</div>
<div class="absolute bottom-16 right-1/3 text-3xl float">🧁</div>



<script src="./index.js"></script>


</body>
</html>
